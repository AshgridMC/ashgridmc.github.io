<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Jasper 2020-2026</title>
<link rel="icon" href="jasper/favicon.png">
<style>
  body {
  background: linear-gradient(
    135deg,        /* diagonal from top-left to bottom-right */
    #0a2a0a,       /* dark green top-left */
    #000000,       /* black middle */
    #4b0000        /* dark red bottom-right */
  );
  min-height: 100vh;
    margin: 0;
    padding: 10px;
  }

  .gallery {
    display: flex;
    flex-direction: column; /* stack images vertically */
    gap: 10px; /* space between images */
    align-items: center; /* optional: center images horizontally */
  }

  .gallery img {
    max-width: 80%;  /* shrink images so they aren’t too wide */
    height: auto;    /* keeps aspect ratio */
    display: block;
  }
</style>
</head>
<body>

<div class="gallery">
  <img src="1.jpg" alt="1">
  <img src="2.jpg" alt="2">
  <img src="3.jpg" alt="3">
  <img src="4.jpg" alt="4">
  <img src="5.jpg" alt="5">
  <img src="6.jpg" alt="6">
  <img src="7.jpg" alt="7">
  <img src="medium.gif" alt="slideshow">
</div>

</body>
</html>
